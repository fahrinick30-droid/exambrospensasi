<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exambro CBT</title>
    
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Diambil dari CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk menerjemahkan React di dalam browser secara otomatis) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- Tempat aplikasi akan dirender -->
    <div id="root"></div>

    <!-- Kode Aplikasi -->
    <script type="text/babel">
        // ========================================================
        // TARUH LINK WEB APP GOOGLE SCRIPT ANDA DI BAWAH INI
        // ========================================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmQL1jc8li6--zTGFYNalcj16sy5bd2eRVe4N-iN4VLWm5cF4YogPxW2cVlj-sytST/exec';

        const { useState, useEffect, useRef } = React;

        // --- KOMPONEN: LAYAR BERANDA ---
        const HomeView = ({ setView }) => (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center space-y-8">
              <div>
                <i className="fa-solid fa-desktop text-blue-600 text-6xl mx-auto mb-4"></i>
                <h1 className="text-3xl font-bold text-slate-800 mt-4">CBT Exambro</h1>
                <p className="text-slate-500 mt-2">Sistem Ujian Aman Berbasis Web</p>
              </div>
              
              <div className="space-y-4">
                <button 
                  onClick={() => setView('student_login')}
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all"
                >
                  <i className="fa-solid fa-play"></i>
                  Mulai Ujian (Siswa)
                </button>
                
                <button 
                  onClick={() => setView('admin')}
                  className="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all"
                >
                  <i className="fa-solid fa-gear"></i>
                  Panel Admin
                </button>
              </div>
            </div>
          </div>
        );

        // --- KOMPONEN: PANEL ADMIN ---
        const AdminView = ({ settings, setSettings, setView }) => {
          const [tempSettings, setTempSettings] = useState(settings);
          const [showSuccess, setShowSuccess] = useState(false);
          const [isSaving, setIsSaving] = useState(false);

          // Fungsi menambah token baru
          const handleAddToken = () => {
            setTempSettings({
              ...tempSettings,
              tokens: [...tempSettings.tokens, { token: '', url: '' }]
            });
          };

          // Fungsi mengubah nilai token
          const handleTokenChange = (index, field, value) => {
            const newTokens = [...tempSettings.tokens];
            newTokens[index][field] = value;
            setTempSettings({ ...tempSettings, tokens: newTokens });
          };

          // Fungsi menghapus token
          const handleRemoveToken = (index) => {
            const newTokens = [...tempSettings.tokens];
            newTokens.splice(index, 1);
            setTempSettings({ ...tempSettings, tokens: newTokens });
          };

          const handleSave = async () => {
            // Helper untuk format URL agar menjadi iframe Google Forms yg rapi
            const formatUrl = (url) => {
              if (!url) return "";
              if (url.includes('docs.google.com/forms') && !url.includes('embedded=true')) {
                return url.includes('?') ? url + '&embedded=true' : url + '?embedded=true';
              }
              return url;
            };
            
            // Format URL di setiap token sebelum disimpan
            const formattedTokens = tempSettings.tokens.map(t => ({
              token: t.token.trim(),
              url: formatUrl(t.url)
            })).filter(t => t.token !== '' && t.url !== ''); // Jangan simpan yang kosong

            const newSettings = { 
              ...tempSettings, 
              tokens: formattedTokens
            };

            setSettings(newSettings);
            localStorage.setItem('exambro_settings', JSON.stringify(newSettings));
            
            // Logika Penyimpanan ke Google Spreadsheet
            if (GOOGLE_SCRIPT_URL !== '') {
              setIsSaving(true);
              try {
                const formData = new URLSearchParams();
                formData.append('examTitle', newSettings.examTitle);
                formData.append('tokensData', JSON.stringify(newSettings.tokens)); // Kirim array objek sebagai string
                formData.append('duration', newSettings.duration);

                await fetch(GOOGLE_SCRIPT_URL, {
                  method: 'POST',
                  body: formData,
                });
                
                setShowSuccess(true);
              } catch (err) {
                console.warn("Gagal terhubung ke Google Script:", err);
                alert("Pengaturan tersimpan di memori perangkat, tetapi gagal terkirim ke Spreadsheet.");
                setShowSuccess(true);
              }
              setIsSaving(false);
              setTimeout(() => {
                setShowSuccess(false);
                setView('home');
              }, 1500);
            } else {
              // Jika URL Script belum diisi, simpan ke lokal saja
              setShowSuccess(true);
              setTimeout(() => {
                setShowSuccess(false);
                setView('home');
              }, 1500);
            }
          };

          return (
            <div className="min-h-screen bg-slate-100 p-4 md:p-8">
              <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8">
                <div className="flex items-center gap-3 mb-6 border-b pb-4">
                  <i className="fa-solid fa-gear text-slate-700 text-3xl"></i>
                  <h2 className="text-2xl font-bold text-slate-800">Pengaturan Ujian (Admin)</h2>
                </div>
                
                {GOOGLE_SCRIPT_URL === '' && (
                  <div className="bg-yellow-100 text-yellow-800 p-3 rounded-lg text-sm mb-5 border border-yellow-200">
                    <i className="fa-solid fa-circle-info mr-2"></i>
                    <strong>Mode Offline:</strong> Anda belum memasukkan URL Web App Google Script ke dalam kode HTML. Pengaturan hanya akan tersimpan di laptop ini.
                  </div>
                )}

                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Judul Ujian Utama</label>
                    <input 
                      type="text" 
                      className="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
                      value={tempSettings.examTitle}
                      onChange={(e) => setTempSettings({...tempSettings, examTitle: e.target.value})}
                      placeholder="Misal: Penilaian Tengah Semester"
                    />
                  </div>
                  
                  {/* --- BAGIAN PENGATURAN TOKEN --- */}
                  <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <div className="flex justify-between items-center mb-4">
                      <p className="font-bold text-blue-800 text-sm">
                        <i className="fa-solid fa-key mr-2"></i>Daftar Token & Link Soal
                      </p>
                      <button 
                        onClick={handleAddToken}
                        className="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1 transition-all"
                      >
                        <i className="fa-solid fa-plus"></i> Tambah Token
                      </button>
                    </div>

                    <div className="space-y-4">
                      {tempSettings.tokens.length === 0 && (
                        <p className="text-sm text-slate-500 text-center italic">Belum ada token. Klik "Tambah Token" untuk membuat.</p>
                      )}
                      
                      {tempSettings.tokens.map((item, index) => (
                        <div key={index} className="bg-white p-3 rounded-lg border border-slate-200 flex flex-col sm:flex-row gap-3 relative">
                          <div className="w-full sm:w-1/3">
                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Kode Token</label>
                            <input 
                              type="text" 
                              className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none uppercase font-mono"
                              value={item.token}
                              onChange={(e) => handleTokenChange(index, 'token', e.target.value)}
                              placeholder="Misal: MTK01"
                            />
                          </div>
                          <div className="w-full sm:w-2/3">
                            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Link Soal (Google Form)</label>
                            <input 
                              type="text" 
                              className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                              value={item.url}
                              onChange={(e) => handleTokenChange(index, 'url', e.target.value)}
                              placeholder="https://docs.google.com/forms/..."
                            />
                          </div>
                          <button 
                            onClick={() => handleRemoveToken(index)}
                            className="absolute -top-2 -right-2 bg-red-100 hover:bg-red-500 text-red-600 hover:text-white w-6 h-6 rounded-full flex items-center justify-center transition-colors shadow-sm"
                            title="Hapus Token"
                          >
                            <i className="fa-solid fa-times text-xs"></i>
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Durasi Ujian Semua Sesi (Menit)</label>
                    <input 
                      type="number" 
                      className="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
                      value={tempSettings.duration}
                      onChange={(e) => setTempSettings({...tempSettings, duration: parseInt(e.target.value) || 0})}
                    />
                  </div>

                  <div className="pt-4 flex gap-3">
                    <button 
                      onClick={handleSave}
                      disabled={isSaving}
                      className={`flex-1 ${isSaving ? 'bg-slate-500' : 'bg-blue-600 hover:bg-blue-700'} text-white font-semibold py-3 px-6 rounded-xl transition-all`}
                    >
                      {isSaving ? (<span><i className="fa-solid fa-spinner fa-spin mr-2"></i>Menyimpan...</span>) : showSuccess ? 'Tersimpan!' : 'Simpan Pengaturan'}
                    </button>
                    <button 
                      onClick={() => setView('home')}
                      className="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-xl transition-all"
                    >
                      Kembali
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- KOMPONEN: LOGIN SISWA ---
        const StudentLoginView = ({ settings, student, setStudent, setExamState, setView }) => {
          const [isLoading, setIsLoading] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');

          const startExam = async () => {
            setErrorMsg('');
            
            // Validasi Input
            if (!student.token) {
              setErrorMsg("Harap isi Token Ujian!");
              return;
            }

            // Pencocokan Token dengan Link
            const enteredToken = student.token.trim().toUpperCase();
            const matchedExam = settings.tokens.find(t => t.token.toUpperCase() === enteredToken);

            if (!matchedExam) {
              setErrorMsg("Token tidak valid atau tidak ditemukan! Silakan periksa kembali Token Anda.");
              return;
            }
            
            // Simpan link aktif yang cocok dengan token ke data student
            setStudent({ ...student, activeUrl: matchedExam.url });
            setIsLoading(true);

            // Meminta Izin Kamera Sebelum Masuk Ujian
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ video: true });
              // Matikan sementara agar tidak dobel. ExamView akan memanggil ulang
              stream.getTracks().forEach(track => track.stop());
            } catch (err) {
              console.warn("Kamera diblokir/ditolak:", err);
              setErrorMsg("Akses kamera WAJIB diizinkan untuk dapat mengikuti ujian ini! Silakan izinkan akses kamera pada popup browser Anda.");
              setIsLoading(false);
              return;
            }

            // Meminta akses Fullscreen
            try {
              if (document.documentElement.requestFullscreen) {
                await document.documentElement.requestFullscreen();
              }
            } catch (err) {
              console.warn("Fullscreen diblokir oleh lingkungan iframe.");
            }

            setExamState({
              timeRemaining: settings.duration * 60,
              violations: 0,
              isWarningOpen: false,
              warningMessage: ''
            });
            setIsLoading(false);
            setView('exam');
          };

          return (
            <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
                <div className="text-center mb-8">
                  <h2 className="text-2xl font-bold text-slate-800">Masuk Ujian</h2>
                  <p className="text-slate-500">{settings.examTitle}</p>
                </div>

                <div className="space-y-4">
                  {errorMsg && (
                    <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm" role="alert">
                      <span className="block sm:inline">{errorMsg}</span>
                    </div>
                  )}

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Token Ujian</label>
                    <input 
                      type="text" 
                      className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-blue-500 uppercase font-mono tracking-widest text-center text-lg font-bold"
                      value={student.token}
                      onChange={(e) => setStudent({...student, token: e.target.value})}
                      placeholder="Masukkan token..."
                    />
                  </div>
                  
                  <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mt-6 text-sm text-yellow-800">
                    <p className="font-bold flex items-center gap-2 mb-1">
                      <i className="fa-solid fa-shield-halved"></i> Perhatian Penting!
                    </p>
                    <ul className="list-disc pl-5 space-y-2">
                      <li>Ujian akan mengunci layar secara otomatis.</li>
                      <li>Kamera akan diaktifkan untuk pemantauan.</li>
                      <li>Membuka tab/aplikasi lain akan dicatat sebagai pelanggaran.</li>
                    </ul>
                  </div>

                  <div className="pt-4 flex gap-3">
                    <button 
                      onClick={startExam}
                      disabled={isLoading}
                      className={`flex-1 ${isLoading ? 'bg-slate-400' : 'bg-green-600 hover:bg-green-700'} text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all`}
                    >
                      {isLoading ? (
                        <i className="fa-solid fa-spinner fa-spin"></i>
                      ) : (
                        <i className="fa-solid fa-play"></i>
                      )}
                      <span>{isLoading ? 'Memeriksa Kamera...' : 'Mulai Kerjakan'}</span>
                    </button>
                    <button 
                      onClick={() => setView('home')}
                      className="bg-slate-200 hover:bg-slate-300 text-slate-700 p-3 rounded-xl transition-all px-4"
                      title="Batal"
                    >
                      <i className="fa-solid fa-right-from-bracket"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- KOMPONEN: INTERFACE UJIAN UTAMA ---
        const ExamView = ({ settings, student, examState, setExamState, setView }) => {
          const videoRef = useRef(null);
          const streamRef = useRef(null);
          const [showConfirmDialog, setShowConfirmDialog] = useState(false);
          
          // Mengambil URL soal yang berhasil dicocokkan dengan Token siswa tadi
          const examUrlRef = useRef(student.activeUrl);

          // State untuk Drag Kamera
          const [camPos, setCamPos] = useState({ x: 0, y: 0 });
          const [isDraggingCam, setIsDraggingCam] = useState(false);
          const dragStart = useRef({ x: 0, y: 0 });

          const playFinishSound = () => {
            try {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              const ctx = new AudioContext();
              const osc1 = ctx.createOscillator();
              const gain1 = ctx.createGain();
              osc1.connect(gain1);
              gain1.connect(ctx.destination);
              osc1.frequency.value = 523.25; 
              gain1.gain.setValueAtTime(0.1, ctx.currentTime);
              osc1.start(ctx.currentTime);
              osc1.stop(ctx.currentTime + 0.15);
              const osc2 = ctx.createOscillator();
              const gain2 = ctx.createGain();
              osc2.connect(gain2);
              gain2.connect(ctx.destination);
              osc2.frequency.value = 659.25; 
              gain2.gain.setValueAtTime(0.1, ctx.currentTime + 0.2);
              osc2.start(ctx.currentTime + 0.2);
              osc2.stop(ctx.currentTime + 0.5);
            } catch (e) {
              console.log("Web Audio API tidak didukung browser ini.");
            }
          };

          const handleFinish = () => {
            playFinishSound();
            if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop());
            if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen().catch(err => console.warn(err));
            setView('finished');
          };

          const handleDragStart = (e) => {
            setIsDraggingCam(true);
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            dragStart.current = { x: clientX - camPos.x, y: clientY - camPos.y };
          };

          useEffect(() => {
            const handleDragMove = (e) => {
              if (!isDraggingCam) return;
              e.preventDefault(); 
              const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
              const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
              setCamPos({ x: clientX - dragStart.current.x, y: clientY - dragStart.current.y });
            };
            const handleDragEnd = () => setIsDraggingCam(false);
            if (isDraggingCam) {
              window.addEventListener('mousemove', handleDragMove);
              window.addEventListener('mouseup', handleDragEnd);
              window.addEventListener('touchmove', handleDragMove, { passive: false });
              window.addEventListener('touchend', handleDragEnd);
            }
            return () => {
              window.removeEventListener('mousemove', handleDragMove);
              window.removeEventListener('mouseup', handleDragEnd);
              window.removeEventListener('touchmove', handleDragMove);
              window.removeEventListener('touchmove', handleDragEnd);
            };
          }, [isDraggingCam]);

          useEffect(() => {
            const startCamera = async () => {
              try {
                streamRef.current = await navigator.mediaDevices.getUserMedia({ video: true });
                if (videoRef.current) videoRef.current.srcObject = streamRef.current;
              } catch (err) {
                console.warn(err);
              }
            };
            startCamera();
            return () => { if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop()); };
          }, []);

          useEffect(() => {
            if (examState.timeRemaining <= 0) {
              handleFinish(); return;
            }
            const timerId = setInterval(() => {
              setExamState(prev => ({ ...prev, timeRemaining: prev.timeRemaining - 1 }));
            }, 1000);
            return () => clearInterval(timerId);
          }, [examState.timeRemaining]);

          useEffect(() => {
            const handleVisibilityChange = () => {
              if (document.hidden) {
                setExamState(prev => {
                  if (prev.violations >= 3) return prev;
                  const newViolations = prev.violations + 1;
                  return {
                    ...prev, violations: newViolations, isWarningOpen: true,
                    warningMessage: newViolations >= 3 ? "PELANGGARAN MAKSIMAL! Ujian dihentikan otomatis." : `PERINGATAN ${newViolations} DARI 3! Berpindah aplikasi.`
                  };
                });
              }
            };
            const handleFullscreenChange = () => {
              if (!document.fullscreenElement) {
                setExamState(prev => {
                  if (prev.violations >= 3) return prev;
                  const newViolations = prev.violations + 1;
                  return {
                    ...prev, violations: newViolations, isWarningOpen: true,
                    warningMessage: newViolations >= 3 ? "PELANGGARAN MAKSIMAL! Ujian dihentikan otomatis." : `PERINGATAN ${newViolations} DARI 3! Keluar layar penuh.`
                  };
                });
              }
            };
            const handleContextMenu = (e) => e.preventDefault();
            const handleKeyDown = (e) => { if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault(); };

            document.addEventListener("visibilitychange", handleVisibilityChange);
            document.addEventListener("fullscreenchange", handleFullscreenChange);
            document.addEventListener("contextmenu", handleContextMenu);
            window.addEventListener("keydown", handleKeyDown);

            return () => {
              document.removeEventListener("visibilitychange", handleVisibilityChange);
              document.removeEventListener("fullscreenchange", handleFullscreenChange);
              document.removeEventListener("contextmenu", handleContextMenu);
              window.removeEventListener("keydown", handleKeyDown);
            };
          }, []);

          const formatTime = (seconds) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
          };

          const handleAcknowledgeWarning = async () => {
            setExamState(prev => ({ ...prev, isWarningOpen: false }));
            if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
              try { await document.documentElement.requestFullscreen(); } catch(e) {}
            }
          };

          return (
            <div className="h-screen w-screen flex flex-col bg-slate-100 overflow-hidden relative select-none">
              
              {showConfirmDialog && (
                <div className="absolute inset-0 z-[60] bg-black/50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
                    <h3 className="text-xl font-bold text-slate-800 mb-4">Kumpulkan Ujian?</h3>
                    <p className="text-slate-600 mb-6">Apakah Anda yakin sudah selesai dan ingin mengumpulkan ujian?</p>
                    <div className="flex gap-3">
                      <button onClick={() => setShowConfirmDialog(false)} className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-2 rounded-xl transition-all">Batal</button>
                      <button onClick={() => { setShowConfirmDialog(false); handleFinish(); }} className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-xl transition-all">Ya, Selesai</button>
                    </div>
                  </div>
                </div>
              )}

              {examState.isWarningOpen && (
                <div className="absolute inset-0 z-50 bg-red-600 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-8 max-w-lg w-full text-center shadow-2xl transform scale-105 transition-transform">
                    <i className="fa-solid fa-triangle-exclamation text-red-600 text-6xl mx-auto mb-4 animate-bounce"></i>
                    <h2 className="text-3xl font-bold text-slate-800 mb-2 mt-4">{examState.violations >= 3 ? "DISKUALIFIKASI!" : "PERINGATAN!"}</h2>
                    <p className="text-lg text-slate-600 mb-6">{examState.warningMessage}</p>
                    <div className="bg-slate-100 p-4 rounded-lg mb-6 text-left">
                      <p className="text-sm font-semibold">Tercatat {examState.violations} pelanggaran.</p>
                      <p className="text-xs text-slate-500">{examState.violations >= 3 ? "Batas maksimal pelanggaran telah tercapai." : "Jika mencapai 3 pelanggaran, ujian dihentikan."}</p>
                    </div>
                    <button onClick={examState.violations >= 3 ? handleFinish : handleAcknowledgeWarning} className={`w-full font-bold py-4 rounded-xl text-lg shadow-lg transition-colors ${examState.violations >= 3 ? 'bg-slate-800 text-white' : 'bg-red-600 text-white'}`}>
                      {examState.violations >= 3 ? 'KUMPULKAN & AKHIRI UJIAN' : 'SAYA MENGERTI'}
                    </button>
                  </div>
                </div>
              )}

              <header className="bg-white shadow-md z-10 px-6 py-3 flex items-center justify-between flex-shrink-0">
                <div className="flex items-center gap-4">
                  <div className="bg-blue-100 text-blue-800 p-2 rounded-lg flex items-center gap-2">
                    <i className="fa-solid fa-clock"></i>
                    <span className="font-bold text-xl">{formatTime(examState.timeRemaining)}</span>
                  </div>
                  <div>
                    <h1 className="font-bold text-slate-800">{settings.examTitle}</h1>
                    <p className="text-xs text-slate-500"><span className="font-mono bg-slate-200 px-2 py-0.5 rounded text-slate-700 font-bold">Token: {student.token.toUpperCase()}</span></p>
                  </div>
                </div>
                
                <div className="flex items-center gap-4">
                  {examState.violations > 0 && (
                    <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-200">
                      Peringatan: {examState.violations}
                    </span>
                  )}
                  <button onClick={() => setShowConfirmDialog(true)} className="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold shadow-sm flex items-center gap-2">
                    <i className="fa-solid fa-circle-check"></i> SELESAI
                  </button>
                </div>
              </header>

              <main className="flex-1 relative w-full h-full bg-slate-200 p-2 min-h-0">
                <div className="relative w-full h-full bg-white rounded-xl shadow-inner overflow-hidden">
                  <iframe src={examUrlRef.current} className="absolute top-0 left-0 w-full h-full border-0" title="Form Ujian"></iframe>
                </div>

                <div 
                  className="absolute top-4 right-6 w-32 h-24 sm:w-36 sm:h-28 bg-black rounded-xl shadow-2xl border-4 border-slate-700 overflow-hidden z-[100] flex items-center justify-center cursor-move"
                  style={{ transform: `translate(${camPos.x}px, ${camPos.y}px)`, touchAction: 'none' }}
                  onMouseDown={handleDragStart}
                  onTouchStart={handleDragStart}
                >
                   <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1] pointer-events-none" />
                  {!videoRef.current && <i className="fa-solid fa-camera text-slate-500 text-2xl absolute pointer-events-none"></i>}
                  <div className="absolute bottom-1 right-1 bg-red-600 w-3 h-3 rounded-full animate-pulse border border-white pointer-events-none"></div>
                </div>
              </main>
            </div>
          );
        };

        // --- KOMPONEN: LAYAR SELESAI ---
        const FinishedView = ({ student, examState, setStudent, setView }) => (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center">
              <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i className="fa-solid fa-circle-check text-green-600 text-5xl"></i>
              </div>
              <h2 className="text-3xl font-bold text-slate-800 mb-2">Ujian Selesai!</h2>
              <p className="text-slate-600 mb-6">
                Terima kasih, jawaban Anda telah direkam.
              </p>
              
              <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-8 text-left space-y-2">
                <p className="text-sm text-slate-600 flex justify-between">
                  <span>Sisa Waktu:</span> <span className="font-semibold text-slate-800">{Math.floor(examState.timeRemaining / 60)} menit</span>
                </p>
                <p className="text-sm text-slate-600 flex justify-between">
                  <span>Catatan Pelanggaran:</span> 
                  <span className={`font-semibold ${examState.violations >= 3 ? 'text-red-600 font-bold' : examState.violations > 0 ? 'text-red-500' : 'text-green-600'}`}>
                    {examState.violations} kali {examState.violations >= 3 ? '(Diskualifikasi)' : ''}
                  </span>
                </p>
              </div>

              <button 
                onClick={() => {
                  setStudent({ token: '', activeUrl: '' });
                  setView('home');
                }}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all"
              >
                Kembali ke Beranda
              </button>
            </div>
          </div>
        );

        // --- KOMPONEN UTAMA (APP) ---
        function App() {
          const [view, setView] = useState('home'); 
          
          const [settings, setSettings] = useState({
            examTitle: 'Ujian Akhir Semester',
            duration: 60,
            tokens: [] // Array untuk menyimpan daftar Token & Link
          });
          
          // State murid ditambahkan 'activeUrl' untuk menyimpan link soal yg berhasil didapat dari token
          const [student, setStudent] = useState({ token: '', activeUrl: '' });
          
          const [examState, setExamState] = useState({
            timeRemaining: 0,
            violations: 0,
            isWarningOpen: false,
            warningMessage: ''
          });

          // Mengambil pengaturan (termasuk JSON Tokens) dari Spreadsheet saat aplikasi dimuat
          useEffect(() => {
            const loadSettings = async () => {
              if (GOOGLE_SCRIPT_URL !== '') {
                try {
                  const response = await fetch(GOOGLE_SCRIPT_URL);
                  const data = await response.json();
                  
                  if (data && data.examTitle) {
                    let parsedTokens = [];
                    try {
                      // Cek apakah data valid dan bukan "undefined" sebelum di-parse
                      if (data.tokensData && data.tokensData !== "undefined" && data.tokensData !== "null") {
                        parsedTokens = typeof data.tokensData === 'string' ? JSON.parse(data.tokensData) : data.tokensData;
                      }
                    } catch (e) { console.error("Gagal parsing token", e); }

                    setSettings({
                      examTitle: data.examTitle,
                      duration: parseInt(data.duration) || 60,
                      tokens: Array.isArray(parsedTokens) ? parsedTokens : []
                    });
                    return; 
                  }
                } catch (error) {
                  console.warn("Gagal membaca dari Spreadsheet. Menggunakan pengaturan lokal...", error);
                }
              }
              
              const savedSettings = localStorage.getItem('exambro_settings');
              if (savedSettings) {
                setSettings(JSON.parse(savedSettings));
              }
            };
            
            loadSettings();
          }, []);

          switch (view) {
            case 'admin': return <AdminView settings={settings} setSettings={setSettings} setView={setView} />;
            case 'student_login': return <StudentLoginView settings={settings} student={student} setStudent={setStudent} setExamState={setExamState} setView={setView} />;
            case 'exam': return <ExamView settings={settings} student={student} examState={examState} setExamState={setExamState} setView={setView} />;
            case 'finished': return <FinishedView student={student} examState={examState} setStudent={setStudent} setView={setView} />;
            default: return <HomeView setView={setView} />;
          }
        }

        // Render Aplikasi ke dalam div #root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

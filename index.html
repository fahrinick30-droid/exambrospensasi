<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exambro CBT</title>
    
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Diambil dari CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk menerjemahkan React di dalam browser secara otomatis) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- Tempat aplikasi akan dirender -->
    <div id="root"></div>

    <!-- Kode Aplikasi -->
    <script type="text/babel">
        // ========================================================
        // TARUH LINK WEB APP GOOGLE SCRIPT ANDA DI BAWAH INI
        // ========================================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmQL1jc8li6--zTGFYNalcj16sy5bd2eRVe4N-iN4VLWm5cF4YogPxW2cVlj-sytST/exec';

        const { useState, useEffect, useRef } = React;

        // --- KOMPONEN: LAYAR BERANDA ---
        const HomeView = ({ setView }) => {
          const [secretClicks, setSecretClicks] = useState(0);

          // Fungsi untuk akses admin tersembunyi (Klik ikon 5x)
          const handleSecretClick = () => {
            const newCount = secretClicks + 1;
            if (newCount >= 5) {
              setView('admin');
              setSecretClicks(0);
            } else {
              setSecretClicks(newCount);
              // Reset hitungan jika tidak diklik lagi dalam 2 detik
              setTimeout(() => setSecretClicks(0), 2000);
            }
          };

          return (
            <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center space-y-8">
                <div onClick={handleSecretClick} className="cursor-default select-none">
                  <i className="fa-solid fa-desktop text-blue-600 text-6xl mx-auto mb-4 transition-transform active:scale-95"></i>
                  <h1 className="text-3xl font-bold text-slate-800 mt-4">CBT Exambro</h1>
                  <p className="text-slate-500 mt-2">Spensasi Keren</p>
                </div>
                
                <div className="space-y-4">
                  <button 
                    onClick={() => setView('student_login')}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all"
                  >
                    <i className="fa-solid fa-play"></i>
                    Mulai Ujian (Siswa)
                  </button>
                </div>
                <p className="text-[10px] text-slate-300">v2.0.2 - Secure Mode Enabled</p>
              </div>
            </div>
          );
        };

        // --- KOMPONEN: PANEL ADMIN ---
        const AdminView = ({ settings, setSettings, setView }) => {
          const [tempSettings, setTempSettings] = useState(settings);
          const [showSuccess, setShowSuccess] = useState(false);
          const [isSaving, setIsSaving] = useState(false);

          const handleAddToken = () => {
            setTempSettings({
              ...tempSettings,
              tokens: [...tempSettings.tokens, { title: '', token: '', url: '', duration: 60 }]
            });
          };

          const handleTokenChange = (index, field, value) => {
            const newTokens = [...tempSettings.tokens];
            newTokens[index][field] = value;
            setTempSettings({ ...tempSettings, tokens: newTokens });
          };

          const handleRemoveToken = (index) => {
            const newTokens = [...tempSettings.tokens];
            newTokens.splice(index, 1);
            setTempSettings({ ...tempSettings, tokens: newTokens });
          };

          const handleSave = async () => {
            const formatUrl = (url) => {
              if (!url) return "";
              if (url.includes('docs.google.com/forms') && !url.includes('embedded=true')) {
                return url.includes('?') ? url + '&embedded=true' : url + '?embedded=true';
              }
              return url;
            };
            
            const formattedTokens = tempSettings.tokens.map(t => ({
              title: t.title.trim() || 'Ujian CBT Exambro',
              token: t.token.trim(),
              url: formatUrl(t.url),
              duration: parseInt(t.duration) || 60
            })).filter(t => t.token !== '' && t.url !== '');

            const newSettings = { ...tempSettings, tokens: formattedTokens };
            setSettings(newSettings);
            localStorage.setItem('exambro_settings', JSON.stringify(newSettings));
            
            if (GOOGLE_SCRIPT_URL !== '') {
              setIsSaving(true);
              try {
                const formData = new URLSearchParams();
                formData.append('tokensData', JSON.stringify(newSettings.tokens));
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData });
                setShowSuccess(true);
              } catch (err) {
                alert("Pengaturan gagal terkirim ke Spreadsheet.");
              }
              setIsSaving(false);
              setTimeout(() => setShowSuccess(false), 1500);
            } else {
              setShowSuccess(true);
              setTimeout(() => setShowSuccess(false), 1500);
            }
          };

          return (
            <div className="min-h-screen bg-slate-100 p-4 md:p-8">
              <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8">
                <div className="flex items-center gap-3 mb-6 border-b pb-4">
                  <i className="fa-solid fa-gear text-slate-700 text-3xl"></i>
                  <h2 className="text-2xl font-bold text-slate-800">Pengaturan Ujian (Admin)</h2>
                </div>

                <div className="space-y-6">
                  <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <div className="flex justify-between items-center mb-4">
                      <p className="font-bold text-blue-800 text-sm">
                        <i className="fa-solid fa-layer-group mr-2"></i>Daftar Sesi Ujian (Berdasarkan Token)
                      </p>
                      <button 
                        onClick={handleAddToken}
                        className="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1 transition-all"
                      >
                        <i className="fa-solid fa-plus"></i> Tambah Sesi
                      </button>
                    </div>

                    <div className="space-y-4">
                      {tempSettings.tokens.length === 0 && (
                        <p className="text-sm text-slate-500 text-center italic py-4">Belum ada sesi/token.</p>
                      )}
                      
                      {tempSettings.tokens.map((item, index) => (
                        <div key={index} className="bg-white p-4 rounded-lg border border-slate-200 flex flex-col gap-3 relative shadow-sm">
                          <div className="flex flex-col sm:flex-row gap-3">
                            <div className="w-full sm:w-2/3">
                              <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Judul Ujian</label>
                              <input 
                                type="text" 
                                className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                value={item.title || ''}
                                onChange={(e) => handleTokenChange(index, 'title', e.target.value)}
                                placeholder="MTK Kelas 7"
                              />
                            </div>
                            <div className="w-full sm:w-1/3">
                              <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Kode Token</label>
                              <input 
                                type="text" 
                                className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none uppercase font-mono"
                                value={item.token}
                                onChange={(e) => handleTokenChange(index, 'token', e.target.value)}
                              />
                            </div>
                          </div>
                          <div className="flex flex-col sm:flex-row gap-3">
                            <div className="w-full sm:w-2/3">
                              <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Link Soal</label>
                              <input 
                                type="text" 
                                className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                value={item.url}
                                onChange={(e) => handleTokenChange(index, 'url', e.target.value)}
                              />
                            </div>
                            <div className="w-full sm:w-1/3">
                              <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Durasi (Menit)</label>
                              <input 
                                type="number" 
                                className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                value={item.duration || ''}
                                onChange={(e) => handleTokenChange(index, 'duration', parseInt(e.target.value) || 0)}
                              />
                            </div>
                          </div>
                          <button 
                            onClick={() => handleRemoveToken(index)}
                            className="absolute -top-3 -right-3 bg-red-100 hover:bg-red-500 text-red-600 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-md border border-white"
                          >
                            <i className="fa-solid fa-trash text-xs"></i>
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="pt-4 flex gap-3">
                    <button 
                      onClick={handleSave}
                      disabled={isSaving}
                      className={`flex-1 ${isSaving ? 'bg-slate-500' : 'bg-blue-600 hover:bg-blue-700'} text-white font-semibold py-3 px-6 rounded-xl transition-all`}
                    >
                      {isSaving ? 'Menyimpan...' : showSuccess ? 'Tersimpan!' : 'Simpan Pengaturan'}
                    </button>
                    <button onClick={() => setView('home')} className="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-xl transition-all">Keluar</button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- KOMPONEN: LOGIN SISWA ---
        const StudentLoginView = ({ settings, setSettings, student, setStudent, setExamState, setView }) => {
          const [isLoading, setIsLoading] = useState(false);
          const [statusMsg, setStatusMsg] = useState('');
          const [errorMsg, setErrorMsg] = useState('');

          const startExam = async () => {
            if (!student.token) { setErrorMsg("Harap isi Token Ujian!"); return; }
            setErrorMsg('');
            setIsLoading(true);

            let latestTokens = settings.tokens;
            if (GOOGLE_SCRIPT_URL !== '') {
              setStatusMsg("Menghubungkan ke server...");
              try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                if (data && data.tokensData) {
                  let parsed = [];
                  try {
                    if (data.tokensData !== "undefined" && data.tokensData !== "null") {
                      parsed = typeof data.tokensData === 'string' ? JSON.parse(data.tokensData) : data.tokensData;
                    }
                  } catch (e) {}
                  latestTokens = Array.isArray(parsed) ? parsed : [];
                  setSettings({ tokens: latestTokens });
                }
              } catch (error) { console.warn("Sync failed."); }
            }

            const enteredToken = student.token.trim().toUpperCase();
            const matchedExam = latestTokens.find(t => t.token.toUpperCase() === enteredToken);

            if (!matchedExam) {
              setErrorMsg("Token tidak valid!");
              setIsLoading(false);
              return;
            }
            
            setStatusMsg("Memeriksa kamera...");
            setStudent({ 
              ...student, 
              activeUrl: matchedExam.url,
              activeTitle: matchedExam.title || 'Ujian CBT Exambro',
              activeDuration: parseInt(matchedExam.duration) || 60
            });

            try {
              const stream = await navigator.mediaDevices.getUserMedia({ video: true });
              stream.getTracks().forEach(track => track.stop());
            } catch (err) {
              setErrorMsg("Akses kamera WAJIB diizinkan!");
              setIsLoading(false);
              return;
            }

            try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (err) {}

            setExamState({
              timeRemaining: (parseInt(matchedExam.duration) || 60) * 60,
              violations: 0,
              isWarningOpen: false,
              warningMessage: ''
            });
            setIsLoading(false);
            setView('exam');
          };

          return (
            <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
                <div className="text-center mb-8">
                  <h2 className="text-2xl font-bold text-slate-800">Masuk Ujian</h2>
                  <p className="text-slate-500">Masukkan token ujian Anda</p>
                </div>
                <div className="space-y-4">
                  {errorMsg && <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm">{errorMsg}</div>}
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Token Ujian</label>
                    <input 
                      type="text" 
                      className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-blue-500 uppercase font-mono tracking-widest text-center text-lg font-bold"
                      value={student.token}
                      onChange={(e) => setStudent({...student, token: e.target.value})}
                      placeholder="MTK01"
                      disabled={isLoading}
                    />
                  </div>
                  <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mt-6 text-sm text-yellow-800">
                    <p className="font-bold flex items-center gap-2 mb-1"><i className="fa-solid fa-shield-halved"></i> Perhatian!</p>
                    <ul className="list-disc pl-5 space-y-1 text-xs">
                      <li>Sistem akan mengunci layar secara otomatis.</li>
                      <li>Kamera aktif untuk pemantauan ujian.</li>
                      <li>Membuka tab lain dianggap pelanggaran.</li>
                    </ul>
                  </div>
                  <div className="pt-4 flex gap-3">
                    <button 
                      onClick={startExam}
                      disabled={isLoading}
                      className={`flex-1 ${isLoading ? 'bg-slate-400' : 'bg-green-600 hover:bg-green-700'} text-white font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all`}
                    >
                      {isLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-play"></i>}
                      <span>{isLoading ? (statusMsg || 'Memproses...') : 'Mulai Kerjakan'}</span>
                    </button>
                    <button onClick={() => setView('home')} className="bg-slate-200 hover:bg-slate-300 text-slate-700 p-3 rounded-xl px-4" disabled={isLoading}><i className="fa-solid fa-right-from-bracket"></i></button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- KOMPONEN: INTERFACE UJIAN UTAMA ---
        const ExamView = ({ student, examState, setExamState, setView }) => {
          const videoRef = useRef(null);
          const streamRef = useRef(null);
          const [showConfirmDialog, setShowConfirmDialog] = useState(false);
          const examUrlRef = useRef(student.activeUrl);
          const [camPos, setCamPos] = useState({ x: 0, y: 0 });
          const [isDraggingCam, setIsDraggingCam] = useState(false);
          const dragStart = useRef({ x: 0, y: 0 });

          // Fungsi Suara Keras (Booster Volume dengan gain tinggi)
          const playLoudAlert = () => {
            try {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              const ctx = new AudioContext();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              
              osc.connect(gain);
              gain.connect(ctx.destination);
              
              // Set volume digital maksimal (1.0)
              gain.gain.setValueAtTime(1.0, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
              
              osc.type = 'sine';
              osc.frequency.setValueAtTime(880, ctx.currentTime); // Nada A5
              osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 1.5);
              
              osc.start(ctx.currentTime);
              osc.stop(ctx.currentTime + 1.5);
            } catch (e) { console.warn("Audio Context blocked."); }
          };

          const handleFinish = () => {
            playLoudAlert(); // Mainakan suara keras saat konfirmasi "Ya"
            if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop());
            if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen().catch(() => {});
            setTimeout(() => setView('finished'), 200); // Sedikit delay agar suara sempat berbunyi
          };

          const handleDragStart = (e) => {
            setIsDraggingCam(true);
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            dragStart.current = { x: clientX - camPos.x, y: clientY - camPos.y };
          };

          useEffect(() => {
            const handleDragMove = (e) => {
              if (!isDraggingCam) return;
              const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
              const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
              setCamPos({ x: clientX - dragStart.current.x, y: clientY - dragStart.current.y });
            };
            const handleDragEnd = () => setIsDraggingCam(false);
            if (isDraggingCam) {
              window.addEventListener('mousemove', handleDragMove);
              window.addEventListener('mouseup', handleDragEnd);
              window.addEventListener('touchmove', handleDragMove, { passive: false });
              window.addEventListener('touchend', handleDragEnd);
            }
            return () => {
              window.removeEventListener('mousemove', handleDragMove);
              window.removeEventListener('mouseup', handleDragEnd);
              window.removeEventListener('touchmove', handleDragMove);
              window.removeEventListener('touchend', handleDragEnd);
            };
          }, [isDraggingCam]);

          useEffect(() => {
            const startCamera = async () => {
              try {
                streamRef.current = await navigator.mediaDevices.getUserMedia({ video: true });
                if (videoRef.current) videoRef.current.srcObject = streamRef.current;
              } catch (err) {}
            };
            startCamera();
            return () => { if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop()); };
          }, []);

          useEffect(() => {
            if (examState.timeRemaining <= 0) { handleFinish(); return; }
            const timerId = setInterval(() => {
              setExamState(prev => ({ ...prev, timeRemaining: prev.timeRemaining - 1 }));
            }, 1000);
            return () => clearInterval(timerId);
          }, [examState.timeRemaining]);

          useEffect(() => {
            const handleSecurity = () => {
              if (document.hidden || !document.fullscreenElement) {
                setExamState(prev => {
                  if (prev.violations >= 3) return prev;
                  const newV = prev.violations + 1;
                  return { ...prev, violations: newV, isWarningOpen: true, warningMessage: newV >= 3 ? "DISKUALIFIKASI!" : `PELANGGARAN ${newV}/3!` };
                });
              }
            };
            document.addEventListener("visibilitychange", handleSecurity);
            document.addEventListener("fullscreenchange", handleSecurity);
            document.addEventListener("contextmenu", e => e.preventDefault());
            return () => {
              document.removeEventListener("visibilitychange", handleSecurity);
              document.removeEventListener("fullscreenchange", handleSecurity);
            };
          }, []);

          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
          };

          return (
            <div className="h-screen w-screen flex flex-col bg-slate-100 overflow-hidden relative select-none">
              
              {/* MODAL KONFIRMASI DENGAN TEKS MERAH PERINGATAN */}
              {showConfirmDialog && (
                <div className="absolute inset-0 z-[60] bg-black/50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl border-4 border-red-500">
                    <i className="fa-solid fa-triangle-exclamation text-red-600 text-5xl mb-4 animate-pulse"></i>
                    <h3 className="text-xl font-black text-red-600 mb-6 leading-tight uppercase">
                      Apakah Anda Sudah Klik KIRIM atau SUBMIT ?
                    </h3>
                    <div className="flex gap-4">
                      <button 
                        onClick={() => setShowConfirmDialog(false)} 
                        className="flex-1 bg-slate-200 hover:bg-slate-300 py-3 rounded-xl font-bold transition-colors"
                      >
                        BELUM
                      </button>
                      <button 
                        onClick={handleFinish} 
                        className="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold shadow-lg transition-colors"
                      >
                        SUDAH
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {examState.isWarningOpen && (
                <div className="absolute inset-0 z-50 bg-red-600 flex items-center justify-center p-4 text-white text-center">
                  <div className="max-w-md">
                    <i className="fa-solid fa-triangle-exclamation text-6xl mb-4"></i>
                    <h2 className="text-3xl font-bold mb-2">{examState.warningMessage}</h2>
                    <button onClick={() => setExamState(p => ({...p, isWarningOpen: false}))} className="bg-white text-red-600 px-8 py-3 rounded-xl font-bold mt-4">SAYA MENGERTI</button>
                  </div>
                </div>
              )}

              <header className="bg-white shadow-md z-10 px-6 py-3 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="bg-blue-100 text-blue-800 p-2 rounded-lg font-bold text-xl">{formatTime(examState.timeRemaining)}</div>
                  <h1 className="font-bold text-slate-800">{student.activeTitle}</h1>
                </div>
                <button onClick={() => setShowConfirmDialog(true)} className="bg-green-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-green-700 transition-colors">SELESAI</button>
              </header>

              <main className="flex-1 relative bg-slate-200 p-2">
                <iframe src={examUrlRef.current} className="w-full h-full border-0 rounded-xl bg-white shadow-inner"></iframe>
                <div 
                  className="absolute top-4 right-6 w-32 h-24 bg-black rounded-xl shadow-2xl border-4 border-slate-700 overflow-hidden z-[100] cursor-move"
                  style={{ transform: `translate(${camPos.x}px, ${camPos.y}px)`, touchAction: 'none' }}
                  onMouseDown={handleDragStart} onTouchStart={handleDragStart}
                >
                   <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transform scale-x-[-1] pointer-events-none" />
                </div>
              </main>
            </div>
          );
        };

        const FinishedView = ({ setView }) => (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 text-center">
            <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
              <i className="fa-solid fa-circle-check text-green-600 text-6xl mb-4"></i>
              <h2 className="text-3xl font-bold text-slate-800 mb-2">Selesai!</h2>
              <p className="text-slate-600 mb-8">Jawaban Anda telah terekam.</p>
              <button onClick={() => window.location.reload()} className="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl shadow-md transition-all active:scale-95">Beranda</button>
            </div>
          </div>
        );

        function App() {
          const [view, setView] = useState('home'); 
          const [settings, setSettings] = useState({ tokens: [] });
          const [student, setStudent] = useState({ token: '', activeUrl: '', activeTitle: '', activeDuration: 60 });
          const [examState, setExamState] = useState({ timeRemaining: 0, violations: 0, isWarningOpen: false, warningMessage: '' });

          useEffect(() => {
            const initSettings = async () => {
              if (GOOGLE_SCRIPT_URL !== '') {
                try {
                  const response = await fetch(GOOGLE_SCRIPT_URL);
                  const data = await response.json();
                  if (data && data.tokensData) {
                    let parsed = [];
                    try { if (data.tokensData !== "undefined" && data.tokensData !== "null") parsed = JSON.parse(data.tokensData); } catch (e) {}
                    setSettings({ tokens: Array.isArray(parsed) ? parsed : [] });
                  }
                } catch (e) {
                  const saved = localStorage.getItem('exambro_settings');
                  if (saved) setSettings(JSON.parse(saved));
                }
              }
            };
            initSettings();
          }, []);

          switch (view) {
            case 'admin': return <AdminView settings={settings} setSettings={setSettings} setView={setView} />;
            case 'student_login': return <StudentLoginView settings={settings} setSettings={setSettings} student={student} setStudent={setStudent} setExamState={setExamState} setView={setView} />;
            case 'exam': return <ExamView student={student} examState={examState} setExamState={setExamState} setView={setView} />;
            case 'finished': return <FinishedView setView={setView} />;
            default: return <HomeView setView={setView} />;
          }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
